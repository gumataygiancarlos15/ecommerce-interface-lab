<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Shopping Cart</title>
</head>
<body>
  <main>
    <header>
    <h1>Gians Clothing</h1>
    <nav>
        <ul>
            <li><a href="landing.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="account.html">Account</a></li>
        </ul>
    </nav>
</header>
  <h2>My Cart</h2>
  <ul class="cart-list">
    <li class="cart-item">
      <img src="tshirt.jpg" alt="Classic White T-shirt">
      <div>
        <h3>T-Shirt</h3>
        <p>₱200</p>
      </div>
      <label>
        Quantity:
        <input type="number" value="1" min="1">
      </label>
    </li>
    <li class="cart-item">
      <img src="pants.jpg" alt="Denim Pants">
      <div>
        <h3>Pants</h3>
        <p>₱500</p>
      </div>
      <label>
        Quantity:
        <input type="number" value="2" min="1">
      </label>
    </li>
  </ul>
  <section>
    <h3>Subtotal</h3>
    <p>₱1200</p>
  </section>
  <button><a href="checkout.html" style="color: white;">Proceed to Checkout</a></button>
</main>
</body>
</html>
